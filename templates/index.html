<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Sharing Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div class="max-w-3xl mx-auto py-10 px-4">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500">
                🚀 Content Sharing Hub
            </h1>
            <p class="text-slate-400 mt-2">Share your thoughts, articles, and updates with the community.</p>
        </header>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl mb-10">
            <h2 class="text-xl font-bold mb-4 text-violet-400">Create a New Post</h2>
            <form action="/create-post" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Post Title</label>
                    <input type="text" name="title" required placeholder="Give your post a catchy title..." 
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-violet-500 text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Content</label>
                    <textarea name="content" rows="4" required placeholder="What's on your mind?" 
                              class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-violet-500 text-white"></textarea>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-pink-500 to-violet-600 hover:from-pink-600 hover:to-violet-700 text-white font-semibold py-2.5 rounded-lg shadow-lg transition-all duration-200">
                    Publish Post
                </button>
            </form>
        </div>

        <div class="space-y-6">
            <h2 class="text-2xl font-bold border-b border-slate-700 pb-2 text-slate-200">Community Feed</h2>
            
            {% for post in posts %}
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-md transition-all duration-200 hover:border-slate-600">
                <h3 class="text-xl font-bold text-white mb-2">{{ post.title }}</h3>
                <p class="text-slate-300 leading-relaxed">{{ post.content }}</p>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
